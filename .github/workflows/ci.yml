name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  megalinter:
    name: MegaLinter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run MegaLinter
        uses: oxsecurity/megalinter/flavors/cupcake@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: true
          SHOW_ELAPSED_TIME: true
          PRINT_ALPACA: false

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: megalinter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build add-on image
        run: |
          docker build \
            --build-arg BUILD_FROM="ghcr.io/home-assistant/amd64-base:latest" \
            -t cups-addon-ci:test \
            cups
